# Keep Render Service Warm (backup method)
# 主方案：server.py 内置保活线程（每10分钟自ping）
# 备用方案：GitHub Actions cron（不可靠，但作为额外保险）
# 注意：GitHub Actions cron 对免费仓库不保证准时，可能延迟或跳过

name: Keep Alive (Backup)

on:
  schedule:
    # 每 5 分钟执行一次（GitHub 允许的最短间隔）
    # 使用非整点时间，降低被延迟的概率
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping website
        run: |
          echo "=== $(date) 保活 ping ==="
          curl -s -o /dev/null -w "主页: HTTP %{http_code}, %{time_total}s\n" --max-time 60 https://hi-english.onrender.com/
          curl -s -o /dev/null -w "API: HTTP %{http_code}, %{time_total}s\n" --max-time 30 https://hi-english.onrender.com/api/keepalive
