<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hi English - 登录</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-apple.png">
<meta name="theme-color" content="#4A90D9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hi English">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary:#4A90D9; --primary-dark:#3A7BC8; --primary-light:#E8F2FC;
  --success:#52C41A; --success-light:#F6FFED; --danger:#FF4D4F; --danger-light:#FFF1F0;
  --warning:#FAAD14; --warning-light:#FFFBE6;
  --bg:#F5F7FA; --card:#FFFFFF; --text:#333; --text-sub:#999; --text-light:#666;
  --border:#E8E8E8; --radius:12px; --shadow:0 2px 8px rgba(0,0,0,0.06);
}
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }

.entry-page { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#4A90D9,#3A7BC8); padding:20px; }
.entry-page h1 { color:#fff; font-size:28px; margin-bottom:8px; }
.entry-page .subtitle { color:rgba(255,255,255,0.8); font-size:14px; margin-bottom:40px; }
.entry-card { background:#fff; border-radius:20px; padding:32px 24px; width:100%; max-width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.15); }
.entry-card h2 { text-align:center; font-size:18px; margin-bottom:24px; color:var(--text); }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:13px; color:var(--text-sub); margin-bottom:4px; }
.form-group input { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; font-size:14px; }
.form-group input:focus { border-color:var(--primary); outline:none; box-shadow:0 0 0 2px var(--primary-light); }
.entry-btn { display:block; width:100%; padding:16px; border:none; border-radius:12px; font-size:16px; font-weight:600; margin-bottom:12px; cursor:pointer; transition:all .2s; }
.entry-btn.student { background:var(--primary); color:#fff; }
.entry-btn.student:hover { background:var(--primary-dark); }
.entry-btn:active { transform:scale(0.97); }
.entry-tip { text-align:center; color:var(--text-sub); font-size:12px; margin-top:16px; }

.remember-row { display:flex; align-items:center; gap:8px; margin:12px 0; }
.remember-row input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); }
.remember-row label { font-size:13px; color:var(--text-sub); cursor:pointer; }

.admin-link { text-align:center; margin-top:8px; }
.admin-link button { background:none; border:none; color:var(--primary); font-size:14px; cursor:pointer; }

.toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:8px; font-size:14px; z-index:9999; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }

/* Login views: seamless switch */
.login-view { display:none; }
.login-view.active { display:block; }
</style>
</head>
<body>

<div class="entry-page">
  <h1>Hi English</h1>
  <p class="subtitle">汽车商务英语学习平台</p>

  <div class="entry-card">
    <!-- 学员登录视图 -->
    <div class="login-view active" id="view-student">
      <h2>学员登录</h2>
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="login-account" placeholder="请输入账号" value="" autocomplete="off">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="请输入密码" value="">
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember-password">
        <label for="remember-password">记住密码（下次自动填充账号和密码）</label>
      </div>
      <button class="entry-btn student" onclick="doStudentLogin()">登录学员端</button>

      <div class="admin-link">
        <button onclick="switchToAdmin()">管理员端 →</button>
      </div>

      <p class="entry-tip">仅管理员录入的账号可登录，不支持注册</p>
    </div>

    <!-- 管理员登录视图 -->
    <div class="login-view" id="view-admin">
      <h2>管理员登录</h2>
      <div class="form-group">
        <label>管理员账号</label>
        <input type="text" id="admin-account" placeholder="请输入管理员账号" value="" autocomplete="off">
      </div>
      <div class="form-group">
        <label>管理员密码</label>
        <input type="password" id="admin-password" placeholder="请输入管理员密码" value="">
      </div>
      <button class="entry-btn student" onclick="doAdminLogin()">登录管理员端</button>

      <div class="admin-link">
        <button onclick="switchToStudent()">← 返回学员登录</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/install-guide.js?v=20260712c"></script>
<script src="js/common.js?v=20260711e"></script>
<script>
function switchToAdmin() {
  document.getElementById('view-student').classList.remove('active');
  document.getElementById('view-admin').classList.add('active');
  setTimeout(function() { document.getElementById('admin-account').focus(); }, 100);
}

function switchToStudent() {
  document.getElementById('view-admin').classList.remove('active');
  document.getElementById('view-student').classList.add('active');
  setTimeout(function() { document.getElementById('login-account').focus(); }, 100);
}

function doStudentLogin() {
  try { sessionStorage.removeItem('dg_autoshow_dismiss'); } catch (e) {}
  var account = document.getElementById('login-account').value.trim();
  var password = document.getElementById('login-password').value;
  var remember = document.getElementById('remember-password').checked;
  var btn = document.querySelector('.entry-btn.student');
  if (!account) { showToast('请输入账号'); return; }
  if (!password) { showToast('请输入密码'); return; }

  btn.disabled = true;
  btn.textContent = '登录中...';

  // 先尝试服务端登录（跨终端认证）
  HiEnglish.serverLogin(account, password).then(function(serverResult) {
    if (serverResult && serverResult.success) {
      // 服务端登录成功
      if (remember) {
        localStorage.setItem('hi_english_saved_credentials', JSON.stringify({account:account, password:password}));
      } else {
        localStorage.removeItem('hi_english_saved_credentials');
      }
      window.location.href = 'student.html';
    } else if (serverResult && !serverResult.success) {
      // 服务端返回了明确的错误
      btn.disabled = false;
      btn.textContent = '登录学员端';
      showToast(serverResult.message);
    } else {
      // 服务端不可达，降级到本地登录
      var result = HiEnglish.login(account, password, false);
      btn.disabled = false;
      btn.textContent = '登录学员端';
      if (result.success) {
        if (remember) {
          localStorage.setItem('hi_english_saved_credentials', JSON.stringify({account:account, password:password}));
        } else {
          localStorage.removeItem('hi_english_saved_credentials');
        }
        window.location.href = 'student.html';
      } else {
        showToast(result.message);
      }
    }
  });
}

function doAdminLogin() {
  var account = document.getElementById('admin-account').value.trim();
  var password = document.getElementById('admin-password').value;
  var btn = document.querySelector('#view-admin .entry-btn');

  if (!account) { showToast('请输入管理员账号'); return; }
  if (!password) { showToast('请输入管理员密码'); return; }

  btn.disabled = true;
  btn.textContent = '登录中...';

  // 先尝试服务端管理员登录
  fetch(HiEnglish.getServerUrl() + '/api/admin-login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: account, password: password })
  }).then(function(resp) { return resp.json(); }).then(function(data) {
    btn.disabled = false;
    btn.textContent = '登录管理员端';
    if (data.success) {
      sessionStorage.setItem('hi_english_admin_token', data.token);
      sessionStorage.setItem('hi_english_admin_name', account);
      // 设置 hi_english_user 供 admin.js init() 验证登录状态
      sessionStorage.setItem('hi_english_user', JSON.stringify({ empid: 'admin', role: 'admin', name: account }));
      window.location.href = 'admin.html';
    } else {
      // 降级到本地登录
      var result = HiEnglish.login(account, password, true);
      if (result.success) {
        window.location.href = 'admin.html';
      } else {
        showToast(data.error || result.message || '用户名或密码错误');
      }
    }
  }).catch(function(e) {
    btn.disabled = false;
    btn.textContent = '登录管理员端';
    // 降级到本地登录
    var result = HiEnglish.login(account, password, true);
    if (result.success) {
      window.location.href = 'admin.html';
    } else {
      showToast('服务端不可达，本地登录: ' + result.message);
    }
  });
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function(){ toast.classList.remove('show'); }, 2500);
}

document.addEventListener('DOMContentLoaded', function() {
  var saved = localStorage.getItem('hi_english_saved_credentials');
  if (saved) {
    try {
      var data = JSON.parse(saved);
      document.getElementById('login-account').value = data.account || '';
      document.getElementById('login-password').value = data.password || '';
      document.getElementById('remember-password').checked = true;
    } catch(e) {}
  }
  document.getElementById('login-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doStudentLogin();
  });
  document.getElementById('admin-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doAdminLogin();
  });
});
</script>
</body>
</html>
